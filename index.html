<!doctype html>
<html lang="en">
  <head>
    <title>Fans Feast</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="./src/components/Header.js"></script>
    <script type="module" src="./src/components/SearchBar.js"></script>
    <script type="module" src="./src/components/Hero.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
    <script type="module">
      import { svgs } from "./src/svgs.js";

      document.querySelectorAll(".chevron").forEach((el) => {
        el.innerHTML = svgs.chevron(22, 22, "currentColor");
      });
    </script>
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>
    <hero-section></hero-section>
    <!-- main content -->
    <div class="py-5 md:py-10 px-6 flex-1">
      <!-- Content Suggestion Row -->
      <div class="px-6 space-y-10">
        <div class="flex flex-col md:flex-row md:justify-between space-y-10">
          <div class="md:w-[48%]">
            <div class="flex justify-between mb-3 items-center">
              <h3>Matches</h3>
              <button class="accent-hover-text">
                See all
                <div class="chevron"></div>
              </button>
            </div>
            <div id="matches-row" class="scrollbox"></div>
          </div>
          <div class="md:w-[48%]">
            <div class="flex justify-between mb-3 items-center">
              <h3>Top Restaurants</h3>
              <button class="accent-hover-text">
                See all
                <div class="chevron"></div>
              </button>
            </div>
            <!-- Suggestion Cards -->
            <div id="near-you-events" class="scrollbox"></div>
          </div>
        </div>

        <div class="flex flex-col md:flex-row md:justify-between">
          <div class="md:w-[48%]">
            <div class="flex justify-between mb-3 items-center">
              <h3>Trending This Week</h3>
              <button class="accent-hover-text">
                See all
                <div class="chevron"></div>
              </button>
            </div>
            <!-- Suggestion Cards -->
            <div id="happening-this-week" class="scrollbox"></div>
          </div>

          <!-- Content Suggestion Row -->
          <div class="md:w-[48%]">
            <div class="flex justify-between mb-3 items-center">
              <h3>Top Sports Bars</h3>
              <button class="accent-hover-text">
                See all
                <div class="chevron"></div>
              </button>
            </div>
            <!-- Suggestion Cards -->
            <div id="popular-events" class="scrollbox"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- footer -->
    <site-footer></site-footer>
    <!-- scripts -->
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
