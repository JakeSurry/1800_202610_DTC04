<!doctype html>
<html lang="en">
  <head>
    <title>Evemts</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="./src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <script type="module" src="./src/components/SearchBar.js"></script>
    <script type="module" src="./src/events.js"></script>
    <link rel="stylesheet" href="main.css" />
    <script type="module">
      import { svgs } from "./src/svgs.js";

      document.querySelectorAll(".chevron").forEach((el) => {
        el.innerHTML = svgs.chevron(22, 22, "currentColor");
      });
    </script>
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main content -->
    <div class="py-5 md:py-10 px-6 flex-1">
      <h1>Events</h1>
      <search-bar></search-bar>
    </div>
    <div class="space-y-10">
      <div class="mx-10">
        <div class="flex justify-between mb-3 items-center">
          <h3>Happening This Week</h3>
          <button class="accent-hover-text">
            See all
            <div class="chevron"></div>
          </button>
        </div>

        <div
          id="events-list"
          class="max-w-6xl mx-auto items-center flex flex-col gap-4"
        ></div>
      </div>
    </div>

    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
  </body>
</html>
