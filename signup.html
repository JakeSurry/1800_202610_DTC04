<!doctype html>
<html lang="en">
  <head>
    <title>Signup</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main content -->
    <div class="flex justify-center p-10 flex-1">
      <div class="flex flex-col space-y-2 w-1/2">
        <h1 class="text-3xl text-center pb-9">Sign up</h1>
        <!-- Form Inputs -->
        <div
          id="authAlert"
          class="d-none text-red-600 text-sm text-center"
        ></div>
        <form id="signUp" action="# " class="flex flex-col space-y-2 pb-9">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="full_name"
            name="full_name"
            placeholder="full name"
          />
          <label for="email">Email</label>
          <input
            type="text"
            id="email"
            name="email"
            placeholder="user@gmail.com"
          />
          <label for="phone_number">Phone Number</label>
          <input
            type="text"
            id="phoneNumber"
            name="phone_number"
            placeholder="000-000-0000"
          />
          <label for="password">Password</label>
          <input
            type="text"
            id="password"
            name="password"
            placeholder="password"
          />
        </form>
        <button form="signUp" class="bg-blue" type="submit">Sign up</button>
        <button
          onclick="location.href = './signUpBusiness.html'"
          class="bg-blue"
        >
          Want to open a business Account?
        </button>
        <button onclick="location.href = './login.html'" class="bg-blue">
          Already have an account? Login
        </button>
      </div>
    </div>

    <!-- Footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/signUp.js"></script>
  </body>
</html>
