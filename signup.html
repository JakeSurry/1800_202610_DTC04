<!doctype html>
<html lang="en">
  <head>
    <title>Signup</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module script -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>

    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main -->
    <div
      class="relative flex justify-center items-center p-10 flex-1 overflow-hidden"
    >
      <section
        class="absolute top-0 left-0 w-full h-1/3 bg-cover bg-center"
        style="background-image: url(&quot;images/hero.png&quot;)"
      >
        <div
          class="absolute inset-0 overlay-green-gradient backdrop-blur-xs"
        ></div>
      </section>
      <div
        class="relative z-10 flex flex-col space-y-3 w-full max-w-md white-card square-rounded-box shadow-2xl items-stretch"
      >
        <h2 class="text-center text-2xl font-semibold pb-4">Sign Up</h2>
        <div
          id="authAlert"
          class="d-none text-red-600 text-sm text-center"
        ></div>
        <form id="signUp" action="#" class="flex flex-col space-y-3 pb-6">
          <label for="full_name">Full Name</label>
          <input
            type="text"
            id="full_name"
            name="full_name"
            placeholder="Full name"
            class="blue-input"
          />
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="user@gmail.com"
            class="blue-input"
          />
          <label for="phoneNumber">Phone Number</label>
          <input
            type="tel"
            id="phoneNumber"
            name="phone_number"
            placeholder="000-000-0000"
            class="blue-input"
          />
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            class="blue-input"
          />
        </form>
        <!-- buttons -->
        <button form="signUp" class="green-gradient text-white" type="submit">
          Sign Up
        </button>
        <button
          onclick="location.href = './signUpBusiness.html'"
          class="text-blue p-0"
        >
          Want to open a business account?
        </button>
        <button onclick="location.href = './login.html'" class="text-blue p-0">
          Already have an account? Login
        </button>
      </div>
    </div>

    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/signUp.js"></script>
  </body>
</html>
