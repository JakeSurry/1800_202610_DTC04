<!doctype html>
<html lang="en">
  <head>
    <title>Business Signup</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main content -->
    <div class="flex justify-center p-10 flex-1">
      <div class="flex flex-col space-y-3 w-1/2 max-w-md">
        <h1 class="text-3xl text-center pb-6">Create Business Account</h1>

        <div id="authAlert" class="hidden text-red text-sm text-center"></div>

        <form id="signUp" class="flex flex-col space-y-3 pb-6">
          <label for="businessName">Business Name</label>
          <input
            type="text"
            id="businessName"
            name="businessName"
            placeholder="name of business"
          />

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="user@gmail.com"
          />

          <label for="phoneNumber">Phone Number</label>
          <input
            type="text"
            id="phoneNumber"
            name="phoneNumber"
            placeholder="000-000-0000"
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="password"
          />
        </form>

        <button form="signUp" class="bg-blue" type="submit">Sign Up</button>

        <button onclick="location.href = './login.html'" class="bg-blue">
          Already have an account? Login
        </button>
      </div>
    </div>

    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/signUpBusiness.js"></script>
  </body>
</html>
