<!doctype html>
<html lang="en">
  <head>
    <title>Business Signup</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="bg-off-white">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main content -->
    <div class="flex justify-center p-10">
      <div class="flex flex-col space-y-3 w-1/2 max-w-md">
        <h1 class="text-3xl text-center pb-6">Create Business Account</h1>

        <div
          id="authAlert"
          class="hidden text-red-600 text-sm text-center"
        ></div>

        <form id="signUp" class="flex flex-col space-y-3 pb-6">
          <label for="businessName">Business Name</label>
          <input
            type="text"
            id="businessName"
            name="businessName"
            class="border-2 rounded-full px-4 py-2"
          />

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="border-2 rounded-full px-4 py-2"
          />

          <label for="phoneNumber">Phone Number</label>
          <input
            type="text"
            id="phoneNumber"
            name="phoneNumber"
            class="border-2 rounded-full px-4 py-2"
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="border-2 rounded-full px-4 py-2"
          />
        </form>

        <button
          form="signUp"
          class="bg-gray-400 rounded-full py-2"
          type="submit"
        >
          Sign Up
        </button>

        <button
          onclick="location.href = './login.html'"
          class="bg-gray-400 rounded-full py-2"
        >
          Already have an account? Login
        </button>
      </div>
    </div>

    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/signUpBusiness.js"></script>
  </body>
</html>
