<!doctype html>
<html lang="en">
  <head>
    <title>Login</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main content -->
    <div class="flex justify-center p-10 flex-1">
      <div class="flex flex-col space-y-2 w-1/2">
        <h1 class="text-3xl text-center pb-9">Login</h1>
        <!-- Form Inputs -->
        <div
          id="authAlert"
          class="d-none text-red-600 text-sm text-center"
        ></div>
        <form id="login" action="# " class="flex flex-col space-y-2 pb-9">
          <label for="email">Email</label>
          <input
            type="text"
            id="email"
            name="email"
            placeholder="user@gmail.com"
          />
          <label for="password">Password</label>
          <input
            type="text"
            id="password"
            name="password"
            placeholder="password"
          />
        </form>
        <!-- Action Buttons -->
        <button form="login" class="bg-blue" type="submit">Login</button>
        <button onclick="location.href = './signup.html'" class="bg-blue">
          New customer? Sign up
        </button>
        <button onclick="location.href = './signup.html'" class="bg-blue">
          Bar or restaurant? Sign in
        </button>
      </div>
    </div>
    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/login.js"></script>
  </body>
</html>
