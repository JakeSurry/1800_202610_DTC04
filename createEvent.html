<!doctype html>
<html lang="en">
  <head>
    <title>Fans Feast</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="./src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <script type="module" src="./src/components/SelectTeamDropdown.js"></script>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <site-navbar></site-navbar>

    <main
      class="max-w-5xl mx-auto px-6 py-6 md:px-10 md:py-8 flex flex-col gap-6"
    >
      <h2>Create Hosted Event</h2>

      <section class="white-card rounded-[28px] p-5 md:p-8">
        <div
          id="formAlert"
          class="hidden mb-4 rounded-2xl border border-red bg-red/10 px-4 py-3 text-sm text-red"
        ></div>

        <form id="createEventForm" class="flex flex-col gap-6">
          <div class="flex flex-col gap-1">
            <h3>Event Details</h3>
            <p class="subtitle">Fill in the information for your event.</p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="flex flex-col gap-2">
              <label for="name">Event Name</label>
              <input
                id="name"
                name="name"
                type="text"
                class="blue-input"
                placeholder="Final Whistle Night"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="venue">Venue</label>
              <input
                id="venue"
                name="venue"
                type="text"
                class="blue-input"
                placeholder="Venue name"
              />
            </div>

            <team-select name="Home_Team"></team-select>
            <team-select name="Away_Team"></team-select>

            <div class="flex flex-col gap-2">
              <label for="eventDate">Date</label>
              <input
                id="eventDate"
                name="eventDate"
                type="date"
                class="blue-input"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="startTime">Start Time</label>
              <input
                id="startTime"
                name="startTime"
                type="time"
                class="blue-input"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="endTime">End Time</label>
              <input
                id="endTime"
                name="endTime"
                type="time"
                class="blue-input"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="duration">Duration</label>
              <select id="duration" name="duration" class="blue-input">
                <option value="30 min">30 min</option>
                <option value="1 hr">1 hr</option>
                <option value="1.5 hrs">1.5 hrs</option>
                <option value="2 hrs" selected>2 hrs</option>
                <option value="2.5 hrs">2.5 hrs</option>
                <option value="3 hrs">3 hrs</option>
                <option value="3.5 hrs">3.5 hrs</option>
                <option value="4 hrs">4 hrs</option>
                <option value="4+ hrs">4+ hrs</option>
              </select>
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label for="image">Cover Image</label>

            <input
              id="image"
              name="image"
              type="file"
              accept="image/*"
              class="blue-input"
            />

            <div id="imageContainer" class="relative group hidden">
              <img
                id="coverImage"
                class="rounded-xl w-full h-48 object-cover"
                src=""
                alt="Event cover preview"
              />

              <div
                class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition rounded-xl flex justify-center items-center"
              >
                <button
                  id="changeImageBtn"
                  type="button"
                  class="default-button main-blue-gradient bright-hover"
                >
                  Change Image
                </button>
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label for="description">Description</label>
            <textarea
              id="description"
              name="description"
              rows="5"
              class="blue-input rounded-lg"
              placeholder="Tell fans what makes this event special. Mention drinks, food, atmosphere, etc."
            ></textarea>
          </div>

          <div class="flex flex-col md:flex-row gap-3 pt-2">
            <button
              type="submit"
              class="default-button main-blue-gradient bright-hover"
            >
              Create Event
            </button>

            <button
              type="button"
              onclick="history.back()"
              class="default-button white-card bright-hover"
            >
              Cancel
            </button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="./src/createEvent.js"></script>
    <site-footer></site-footer>
  </body>
</html>
