<!doctype html>
<html lang="en">
  <head>
    <title>Fans Feast</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- ============================= -->
    <!-- Add jquery                    -->
    <!-- ============================= -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="/src/components/HeroBusiness.js"></script>
    <script type="module" src="/src/components/InfoSectionBusiness.js"></script>
    <link rel="stylesheet" href="main.css" />
    <script type="module">
      import { svgs } from "./src/svgs.js";

      document.querySelectorAll(".chevron").forEach((el) => {
        el.innerHTML = svgs.chevron(22, 22, "currentColor");
      });
    </script>
  </head>

  <body class="bg-off-white">
    <!-- Header -->
    <site-navbar></site-navbar>
    <hero-section-buisness></hero-section-buisness>
    <info-section></info-section>
    <div class="flex flex-col px-6 gap-3">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold md:text-2xl">Upcoming Hosted Events</h2>
        <button class="accent-hover-text">
          See all
          <div class="chevron"></div>
        </button>
      </div>
      <div
        id="hosted-event-card"
        class="flex space-x-3 overflow-x-scroll overflow-y-hidden pr-10"
      ></div>
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold md:text-2xl">Match Schedule</h2>
        <button class="accent-hover-text">
          See all
          <div class="chevron"></div>
        </button>
      </div>
      <div id="matches" class="flex flex-col gap-2"></div>
    </div>
    <footer
      class="bg-dark-blue text-white flex items-center justify-center h-10 mt-6"
    >
      © 2026 Fan's Feast, Inc
    </footer>
    <script type="module" src="./src/mainBusiness.js"></script>
  </body>
</html>
