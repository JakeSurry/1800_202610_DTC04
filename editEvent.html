<!doctype html>
<html lang="en">
  <head>
    <title>Fans Feast</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="./src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <site-navbar></site-navbar>

    <main
      class="max-w-5xl mx-auto px-6 py-6 md:px-10 md:py-8 flex flex-col gap-6"
    >
      <h2>Edit Hosted Event</h2>

      <section class="white-card rounded-[28px] p-5 md:p-8">
        <div
          id="formAlert"
          class="hidden mb-4 rounded-2xl border border-red bg-red/10 px-4 py-3 text-sm text-red"
        ></div>

        <form id="editEventForm" class="flex flex-col gap-6">
          <div class="flex flex-col gap-1">
            <h3>Event Details</h3>
            <p class="subtitle">
              Update the information for your hosted event.
            </p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="flex flex-col gap-2">
              <label for="name">Event Name</label>
              <input
                id="name"
                name="name"
                type="text"
                class="blue-input"
                placeholder="Final Whistle Night"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="venue">Venue</label>
              <input
                id="venue"
                name="venue"
                type="text"
                class="blue-input"
                placeholder="Local"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="team1">Team 1</label>
              <input
                id="team1"
                name="team1"
                type="text"
                class="blue-input"
                placeholder="e.g. Canada"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="team2">Team 2</label>
              <input
                id="team2"
                name="team2"
                type="text"
                class="blue-input"
                placeholder="e.g. Mexico"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="eventDate">Date</label>
              <input
                id="eventDate"
                name="eventDate"
                type="date"
                class="blue-input"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label for="eventTime">Time</label>
              <input
                id="eventTime"
                name="eventTime"
                type="time"
                class="blue-input"
              />
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label for="description">Description</label>
            <textarea
              id="description"
              name="description"
              rows="5"
              class="blue-input rounded-lg"
              placeholder="Tell fans what makes this event special. Mention drinks, food, atmosphere, etc."
            ></textarea>
          </div>

          <div class="flex flex-col md:flex-row gap-3 pt-2">
            <button type="submit" class="main-blue-gradient bright-hover">
              Save Changes
            </button>

            <button
              type="button"
              onclick="history.back()"
              class="white-card clear-hover"
            >
              Cancel
            </button>

            <button
              type="button"
              id="deleteEventBtn"
              class="bg-[#FF0000] text-white bright-hover"
            >
              Delete Event
            </button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="./src/editEvent.js"></script>
    <site-footer></site-footer>
  </body>
</html>
