<!doctype html>
<html lang="en">
  <head>
    <title>Fans Feast</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="./src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
    <script type="module" src="./src/components/Loader.js"></script>
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <page-loader></page-loader>
    <site-navbar></site-navbar>

    <main class="w-full px-6 md:px-10 py-6 md:py-8 flex flex-col gap-6 flex-1">
      <h2>Hosted Events</h2>

      <section class="white-card rounded-[28px] p-5 md:p-8 flex flex-col gap-5">
        <div class="flex flex-col gap-1">
          <h3>Your Hosted Events</h3>
          <p class="subtitle">
            All current hosted events for your business account.
          </p>
        </div>

        <div
          id="eventsAlert"
          class="hidden rounded-2xl border border-red bg-red/10 px-4 py-3 text-sm text-red"
        ></div>

        <div id="hosted-events-list" class="flex flex-col gap-4"></div>
      </section>
    </main>

    <site-footer></site-footer>

    <script type="module" src="./src/hostedEvents.js"></script>
  </body>
</html>
