<!doctype html>
<html lang="en">
  <head>
    <title>Profile</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <script type="module" src="./src/components/SelectTeamDropdown.js"></script>
    <link rel="stylesheet" href="main.css" />
    <script type="module">
      import { svgs } from "./src/svgs.js";
      // indiv
      document.getElementById("edit").innerHTML = svgs.edit(30, 30, "#f9fafb");
      document.getElementById("chevron").innerHTML = svgs.chevron(
        22,
        22,
        "currentColor",
      );
      document.getElementById("location-icon").innerHTML = svgs.location(
        20,
        20,
        "#f9fafb",
      );
      document.getElementById("email-icon").innerHTML = svgs.mail(
        20,
        20,
        "#f9fafb",
      );
      document.getElementById("phone-icon").innerHTML = svgs.phone(
        20,
        20,
        "#f9fafb",
      );
    </script>
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main content -->
    <div class="flex-1 flex flex-col">
      <!-- Edit View -->
      <div id="editProfileView" class="hidden">
        <div
          class="fixed inset-0 overlay-black-gradient backdrop-blur-md z-50 flex items-center justify-center"
        >
          <div
            class="clear-window-color square-rounded-box flex-col items-stretch w-full max-w-md"
          >
            <div class="flex justify-between items-center mb-5">
              <h2 class="subheading text-lg">Edit Profile</h2>
              <button
                id="toProfile"
                class="default-button bg-gray small-button"
              >
                Cancel
              </button>
            </div>

            <form
              id="editProfile"
              action="# "
              class="flex flex-col space-y-2 pb-3"
            >
              <label for="displayName" class="text-white-t2"
                >Display Name</label
              >
              <input
                type="text"
                id="displayName"
                name="displayName"
                placeholder="display name"
                class="white-input clear-hover"
              />

              <label for="editLocation" class="text-white-t2">Location</label>
              <input
                type="text"
                id="editLocation"
                name="editLocation"
                placeholder="vancouver"
                class="white-input clear-hover"
              />

              <label for="editPhone" class="text-white-t2">Phone</label>
              <input
                type="text"
                id="editPhone"
                name="editPhone"
                placeholder="000-000-0000"
                class="white-input clear-hover"
              />

              <team-select
                name="favoriteTeam"
                label="Favorite Team"
                wrapper-class="flex flex-col gap-2 mt-2"
                label-class="text-white-t2"
                select-wrapper-class="relative"
                select-class="w-full appearance-none rounded-full border border-white/20 bg-white/12 px-5 py-4 pr-14 text-base text-white outline-none transition focus:border-white/30 focus:bg-white/16"
              ></team-select>

              <button
                type="submit"
                class="default-button btn btn-success main-blue-gradient mt-9"
              >
                Done
              </button>
            </form>
          </div>
        </div>
      </div>
      <section
        class="relative bg-no-repeat bg-center bg-cover pt-2 pb-20 px-6"
        style="background-image: url(&quot;images/hero.png&quot;)"
      >
        <div class="absolute inset-0 hero-blue-gradient"></div>
        <!-- Profile View -->
        <div id="profileView" class="relative z-10">
          <div class="flex justify-between items-center mb-5">
            <h2 class="subheading text-lg">Profile</h2>
            <button id="toEdit" class="default-button">
              <div id="edit"></div>
            </button>
          </div>
          <!-- ============================== -->
          <!-- Profile Info -->
          <!-- ============================== -->
          <div class="flex">
            <div id="profile-avatar" class="size-30"></div>
            <div class="flex flex-col justify-around ml-8 space-y-2">
              <div class="border-b border-white-t2 space-y-1 pb-2">
                <h1 class="text-white">
                  <span id="display-name"></span>
                </h1>
                <p class="text-white font-semibold">
                  <span id="full-name"></span>
                </p>
              </div>

              <div class="flex gap-2 items-center">
                <div id="location-icon"></div>
                <p class="text-white">
                  <span id="location"></span>
                </p>
              </div>

              <div class="flex gap-2 items-center">
                <div id="email-icon"></div>
                <p class="text-white">
                  <span id="email"></span>
                </p>
              </div>

              <div class="flex gap-2 items-center">
                <div id="phone-icon"></div>
                <p class="text-white">
                  <span id="phone"></span>
                </p>
              </div>

              <div
                id="favorite-team-card"
                class="hidden clear-window-color rounded-full px-3 py-2 w-fit items-center gap-3"
              >
                <img
                  id="favorite-team-flag"
                  src=""
                  alt="Favorite team flag"
                  class="h-8 w-8 rounded-full object-cover"
                />
                <div class="flex flex-col leading-tight">
                  <span
                    class="text-[10px] uppercase tracking-[0.18em] text-white-t1"
                  >
                    Favorite Team
                  </span>
                  <span
                    id="favorite-team"
                    class="text-sm text-white font-medium"
                  ></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- ============================== -->
      <!-- Events -->
      <!-- ============================== -->
      <div
        class="flex-1 bg-off-white rounded-t-3xl -mt-6 relative z-10 py-5 md:py-10 px-6"
      >
        <div class="flex justify-between mb-3 items-center">
          <div class="flex justify-between mb-3 items-center w-full">
            <h3>My Events</h3>
            <a class="accent-hover-text">
              See all
              <div id="chevron"></div>
            </a>
          </div>
        </div>
        <div id="events" class="scrollbox"></div>
      </div>
    </div>

    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/profile.js"></script>
  </body>
</html>
