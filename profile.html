<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <script type="module" src="/src/components/Header.js"></script>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <site-navbar></site-navbar>
    <div class="flex flex-col relative w-5/6 m-auto mt-16">
      <div class="flex flex-row justify-end">
        <button class="cursor-pointer">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#000000"
            stroke-width="1"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M7 7h-1a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-1"
            />
            <path
              d="M20.385 6.585a2.1 2.1 0 0 0 -2.97 -2.97l-8.415 8.385v3h3l8.385 -8.415z"
            />
            <path d="M16 5l3 3" />
          </svg>
        </button>
      </div>
      <div class="flex flex-row h-full">
        <img
          src="./images/elmo.jpg"
          alt="profile-image"
          class="border-4 border-gray-400 rounded-2xl size-48"
        />
        <div class="flex flex-col justify-around ml-8 w-full">
          <h1 class="bg-gray-400 p-4 rounded-2xl text-2xl">Full Name</h1>
          <h1 class="bg-gray-400 p-4 rounded-2xl text-2xl">
            <span id="name-goes-here"></span>
          </h1>
        </div>
      </div>
      <div class="flex flex-col gap-y-2 mt-8 mb-16">
        <h1 class="bg-gray-400 px-4 py-2 rounded-2xl text-1xl">Location</h1>
        <h1 class="bg-gray-400 px-4 py-2 rounded-2xl text-1xl">Email</h1>
        <h1 class="bg-gray-400 px-4 py-2 rounded-2xl text-1xl">Phone Number</h1>
      </div>
      <div class="flex justify-between mb-3 items-center">
        <h1 class="text-3xl">My Events</h1>
      </div>
      <!-- Suggestion Cards -->
      <div id="near-you-events" class="flex space-x-3 overflow-x-scroll"></div>
    </div>

    <script type="module" src="./src/index.js"></script>
    <script type="module" src="./src/profile.js"></script>
  </body>
</html>
