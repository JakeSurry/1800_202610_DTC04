<!doctype html>
<html lang="en">
  <head>
    <title>Profile</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
    <script type="module">
      import { svgs } from "./src/svgs.js";
      // indiv
      document.getElementById("edit").innerHTML = svgs.edit(48, 48, "#0f172a");
    </script>
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main content -->
    <div class="py-5 md:py-10 px-6 flex-1">
      <!-- Edit View -->
      <div id="editProfileView" class="hidden">
        <h1>Edit Profile</h1>
        <button id="toProfile" class="bg-gray">Cancel</button>
        <form id="editProfile" action="# " class="flex flex-col space-y-2 pb-9">
          <label for="displayName">Display Name</label>
          <input
            type="text"
            id="displayName"
            name="displayName"
            placeholder="display name"
          />
          <label for="editLocation">Location</label>
          <input
            type="text"
            id="editLocation"
            name="editLocation"
            placeholder="vancouver"
          />
          <label for="editPhone">Phone</label>
          <input
            type="text"
            id="editPhone"
            name="editPhone"
            placeholder="000-000-0000"
          />
          <button type="submit" class="btn btn-success bg-blue">Done</button>
        </form>
      </div>
      <!-- Profile View -->
      <div id="profileView">
        <div class="flex flex-row justify-between">
          <h1>Profile</h1>

          <button id="toEdit">
            <div id="edit"></div>
          </button>
        </div>
        <!-- ============================== -->
        <!-- Profile Info -->
        <!-- ============================== -->
        <div class="flex flex-row h-full">
          <img
            src="./images/elmo.jpg"
            alt="profile-image"
            class="white-card rounded-2xl size-48"
          />
          <div class="flex flex-col justify-around ml-8 w-full">
            <p>Full Name</p>
            <p class="bg-gray-400 p-4 rounded-2xl text-2xl">
              <span id="full-name"></span>
            </p>
            <p>Display Name</p>
            <p class="bg-gray-400 p-4 rounded-2xl text-2xl">
              <span id="display-name"></span>
            </p>
          </div>
        </div>
        <div class="flex flex-col gap-y-2 mt-8 mb-16">
          <p>Location</p>
          <p class="bg-gray-400 px-4 py-2 rounded-2xl text-1xl">
            <span id="location"></span>
          </p>
          <p>Email</p>
          <p class="bg-gray-400 px-4 py-2 rounded-2xl text-1xl">
            <span id="email"></span>
          </p>
          <p>Phone</p>
          <p class="bg-gray-400 px-4 py-2 rounded-2xl text-1xl">
            <span id="phone"></span>
          </p>
        </div>
      </div>
      <!-- ============================== -->
      <!-- Events -->
      <!-- ============================== -->
      <div>
        <div class="flex justify-between mb-3 items-center">
          <h1 class="text-3xl">My Events</h1>
        </div>
      </div>
      <div id="near-you-events" class="flex space-x-3 overflow-x-scroll"></div>
    </div>

    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/index.js"></script>
    <script type="module" src="./src/profile.js"></script>
  </body>
</html>
