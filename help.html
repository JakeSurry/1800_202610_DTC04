<!doctype html>
<html lang="en">
  <head>
    <title>Help</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
    <script type="module">
      import { svgs } from "./src/svgs.js";

      document.getElementById("phone").innerHTML = svgs.phone(
        22,
        22,
        "#f9fafb",
      );
      document.getElementById("mail").innerHTML = svgs.mail(22, 22, "#f9fafb");
    </script>
  </head>

  <body class="bg-off-white min-h-screen flex flex-col">
    <!-- header -->
    <site-navbar></site-navbar>

    <!-- main content -->
    <section
      class="relative bg-no-repeat bg-center bg-cover overflow-hidden flex px-6 py-10"
      style="background-image: url(&quot;images/hero.png&quot;)"
    >
      <div class="absolute inset-0 hero-blue-gradient"></div>
      <!-- Contact Us -->
      <div class="relative z-10 space-y-4">
        <h2 class="text-white">Contact us</h2>
        <div>
          <div class="flex space-x-3">
            <div id="phone"></div>
            <p class="text-white">+1 (604) 123 45678</p>
          </div>
          <div class="flex space-x-3">
            <div id="mail"></div>
            <p class="text-white">fanfeast@contact.com</p>
          </div>
        </div>
      </div>
    </section>
    <div class="py-5 md:py-10 px-6 flex-1">
      <!-- FAQs -->
      <div class="space-y-4">
        <h2>FAQs</h2>
        <div class="space-y-8">
          <div>
            <h3>General Questions</h3>
            <div id="general-questions" class="flex flex-col space-y-5"></div>
          </div>
          <div>
            <h3>Fan Questions</h3>
            <div id="fan-questions" class="flex flex-col space-y-5"></div>
          </div>
          <div>
            <h3>Organization Questions</h3>
            <div
              id="organization-questions"
              class="flex flex-col space-y-5"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/help.js"></script>
  </body>
</html>
