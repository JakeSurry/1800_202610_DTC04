<!doctype html>
<html lang="en">
  <head>
    <title>Help</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tabler/icons-sprite@latest/dist/tabler-sprite.js"></script>
    <!-- module scripts -->
    <script type="module" src="/src/components/Header.js"></script>
    <script type="module" src="./src/components/Footer.js"></script>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="bg-off-white">
    <!-- header -->
    <site-navbar></site-navbar>
    <!-- main content -->
    <div class="space-y-6 py-5 md:py-10">
      <!-- Contact Us -->
      <div class="space-y-4">
        <h1>Contact us</h1>
        <div>
          <div class="flex space-x-3">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"

                d="M9 3a1 1 0 0 1 .877 .519l.051 .11l2 5a1 1 0 0 1 -.313 1.16l-.1 .068l-1.674 1.004l.063 .103a10 10 0 0 0 3.132 3.132l.102 .062l1.005 -1.672a1 1 0 0 1 1.113 -.453l.115 .039l5 2a1 1 0 0 1 .622 .807l.007 .121v4c0 1.657 -1.343 3 -3.06 2.998c-8.579 -.521 -15.418 -7.36 -15.94 -15.998a3 3 0 0 1 2.824 -2.995l.176 -.005h4z"
              />
            </svg>
            <p>+1 (604) 123 45678</p>
          </div>
          <div class="flex space-x-3">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M22 7.535v9.465a3 3 0 0 1 -2.824 2.995l-.176 .005h-14a3 3 0 0 1 -2.995 -2.824l-.005 -.176v-9.465l9.445 6.297l.116 .066a1 1 0 0 0 .878 0l.116 -.066l9.445 -6.297z"

              />
            </svg>
            <p>fanfeast@contact.com</p>
          </div>
        </div>
      </div>
      <!-- FAQs -->
      <div class="space-y-4">
        <h1>FAQs</h1>
        <div class="space-y-8">
          <div>
            <h2 class="font-bold text-2xl">General Questions</h2>
            <div
              id="general-questions"
              class="flex flex-col space-y-5 overflow-auto"
            ></div>
          </div>
          <div>
            <h2 class="font-bold text-2xl">Fan Questions</h2>
            <div
              id="fan-questions"
              class="flex flex-col space-y-5 overflow-auto"
            ></div>
          </div>
          <div>
            <h2 class="font-bold text-2xl">Organization Questions</h2>
            <div
              id="organization-questions"
              class="flex flex-col space-y-5 overflow-auto"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <!-- footer -->
    <site-footer></site-footer>

    <!-- scripts -->
    <script type="module" src="./src/help.js"></script>

</html>
